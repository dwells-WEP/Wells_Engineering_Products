<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Railroading Scale Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f7;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .calculator-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 100%;
        }
        h2 { margin-top: 0; color: #111; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .quick-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .preset-btn {
            background-color: #eef2f6;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .preset-btn:hover { background-color: #dbe4ee; }
        .results-box {
            background-color: #f8f9fa;
            border-left: 4px solid #0066cc;
            padding: 15px;
            border-radius: 0 6px 6px 0;
            margin-top: 25px;
        }
        .result-line {
            font-size: 18px;
            margin: 10px 0;
        }
        .result-line strong { color: #0066cc; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Model Scale Calculator</h2>
    <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Convert prototypes into precise modeling dimensions.</p>
    
    <div class="form-group">
        <label for="scaleSelect">Target Scale</label>
        <select id="scaleSelect" onchange="calculateScale()">
            <option value="22.5">1:22.5 (G)</option>
            <option value="29">1:29 (G-Standard)</option>
            <option value="32">1:32 (Gauge 1)</option>
            <option value="48">1:48 (O)</option>
            <option value="64">1:64 (S)</option>
            <option value="87.1" selected>1:87.1 (HO)</option>
            <option value="120">1:120 (TT)</option>
            <option value="160">1:160 (N)</option>
            <option value="220">1:220 (Z)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="realWorldInput">Real-World Dimension (Inches)</label>
        <input type="number" id="realWorldInput" placeholder="Enter inches..." oninput="calculateScale()">
    </div>

    <label>Standard Benchmarks</label>
    <div class="quick-presets">
        <button class="preset-btn" onclick="applyPreset(20)">Handwheel (20")</button>
        <button class="preset-btn" onclick="applyPreset(34.5)">Coupler Ht (34.5")</button>
        <button class="preset-btn" onclick="applyPreset(18.5)">Ladder Rungs (18.5")</button>
        <button class="preset-btn" onclick="applyPreset(120)">Car Width (120")</button>
        <button class="preset-btn" onclick="applyPreset(186)">Car Height (186")</button>
    </div>

    <div class="results-box">
        <div class="result-line">Model Inches: <strong id="inchResult">0.000 in</strong></div>
        <div class="result-line">Model Metric: <strong id="mmResult">0.00 mm</strong></div>
    </div>
</div>

<script>
    function calculateScale() {
        const scaleFactor = parseFloat(document.getElementById('scaleSelect').value);
        const inputInches = parseFloat(document.getElementById('realWorldInput').value);
        
        if (isNaN(inputInches) || inputInches <= 0) {
            document.getElementById('inchResult').innerText = "0.000 in";
            document.getElementById('mmResult').innerText = "0.00 mm";
            return;
        }

        const scaledInches = inputInches / scaleFactor;
        const scaledMm = scaledInches * 25.4;

        document.getElementById('inchResult').innerText = scaledInches.toFixed(3) + " in";
        document.getElementById('mmResult').innerText = scaledMm.toFixed(2) + " mm";
    }

    function applyPreset(value) {
        document.getElementById('realWorldInput').value = value;
        calculateScale();
    }
</script>

</body>
</html>
